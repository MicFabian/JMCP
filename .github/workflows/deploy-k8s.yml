name: Deploy JMCP to Kubernetes

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/micfabian/jmcp
  K8S_NAMESPACE: jmcp-prod
  DEPLOYMENT_NAME: mcp-java
  CONTAINER_NAME: mcp-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: jmcp-deploy-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify build and tests
        run: ./gradlew --no-daemon clean test

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Create Kube config
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure namespace
        run: |
          kubectl get namespace "${{ env.K8S_NAMESPACE }}" >/dev/null 2>&1 || kubectl create namespace "${{ env.K8S_NAMESPACE }}"

      - name: Ensure GHCR pull secret
        env:
          GHCR_PULL_USERNAME: ${{ vars.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_PULL_TOKEN}" ]; then
            echo "Missing required secret: GHCR_PULL_TOKEN"
            exit 1
          fi

          USERNAME="${GHCR_PULL_USERNAME:-micfabian}"

          kubectl create secret docker-registry ghcr-secret \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --docker-server=ghcr.io \
            --docker-username="${USERNAME}" \
            --docker-password="${GHCR_PULL_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure app secret
        env:
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MCP_API_KEY}" ]; then
            echo "Missing required secret: MCP_API_KEY"
            exit 1
          fi

          kubectl create secret generic mcp-java-secrets \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --from-literal=api-key="${MCP_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure TLS secret (optional)
        env:
          TLS_CERT: ${{ secrets.TLS_CERT }}
          TLS_KEY: ${{ secrets.TLS_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${TLS_CERT}" ] && [ -n "${TLS_KEY}" ]; then
            kubectl create secret tls mcp-java-tls \
              --namespace "${{ env.K8S_NAMESPACE }}" \
              --cert <(printf '%s' "${TLS_CERT}") \
              --key <(printf '%s' "${TLS_KEY}") \
              --dry-run=client -o yaml | kubectl apply -f -
            echo "Updated mcp-java-tls"
          else
            echo "TLS_CERT/TLS_KEY not set. Skipping TLS secret update."
          fi

      - name: Deploy manifests
        run: |
          set -euo pipefail
          IMAGE_TAG="sha-$(git rev-parse --short HEAD)"
          IMAGE_REF="${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          sed -E "s|image: .*|image: ${IMAGE_REF}|" k8s/deployment.yaml > /tmp/deployment.yaml

          kubectl -n "${{ env.K8S_NAMESPACE }}" apply -f /tmp/deployment.yaml
          kubectl -n "${{ env.K8S_NAMESPACE }}" apply -f k8s/service.yaml
          kubectl -n "${{ env.K8S_NAMESPACE }}" apply -f k8s/ingress.yaml

          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status \
            deployment/${{ env.DEPLOYMENT_NAME }} --timeout=300s

      - name: Post-deploy status
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" get deploy,svc,ingress
