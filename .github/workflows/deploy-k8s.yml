name: Deploy JMCP to Kubernetes

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/micfabian/jmcp
  K8S_NAMESPACE: jmcp-prod
  DEPLOYMENT_NAME: mcp-java
  CONTAINER_NAME: mcp-service

concurrency:
  group: jmcp-deploy-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify build and tests
        run: ./gradlew --no-daemon clean test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Create Kube config
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure namespace
        run: |
          kubectl get namespace "${{ env.K8S_NAMESPACE }}" >/dev/null 2>&1 || kubectl create namespace "${{ env.K8S_NAMESPACE }}"

      - name: Ensure GHCR pull secret
        env:
          GHCR_PULL_USERNAME: ${{ vars.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_PULL_TOKEN}" ]; then
            echo "Missing required secret: GHCR_PULL_TOKEN"
            exit 1
          fi

          USERNAME="${GHCR_PULL_USERNAME:-micfabian}"

          kubectl create secret docker-registry ghcr-secret \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --docker-server=ghcr.io \
            --docker-username="${USERNAME}" \
            --docker-password="${GHCR_PULL_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure app secret
        env:
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MCP_API_KEY}" ]; then
            echo "Missing required secret: MCP_API_KEY"
            exit 1
          fi

          kubectl create secret generic mcp-java-secrets \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --from-literal=api-key="${MCP_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure TLS secret (optional)
        env:
          TLS_CERT: ${{ secrets.TLS_CERT }}
          TLS_KEY: ${{ secrets.TLS_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${TLS_CERT}" ] && [ -n "${TLS_KEY}" ]; then
            kubectl create secret tls mcp-java-tls \
              --namespace "${{ env.K8S_NAMESPACE }}" \
              --cert <(printf '%s' "${TLS_CERT}") \
              --key <(printf '%s' "${TLS_KEY}") \
              --dry-run=client -o yaml | kubectl apply -f -
            echo "Updated mcp-java-tls"
          else
            echo "TLS_CERT/TLS_KEY not set. Skipping TLS secret update."
          fi

      - name: Deploy manifests
        env:
          K8S_INGRESS_HOST: ${{ vars.K8S_INGRESS_HOST }}
        run: |
          set -euo pipefail
          kubectl -n "${{ env.K8S_NAMESPACE }}" apply -f k8s/deployment.yaml
          kubectl -n "${{ env.K8S_NAMESPACE }}" apply -f k8s/service.yaml

          HOST="${K8S_INGRESS_HOST:-mcp.local}"
          sed -e "s/- mcp.local/- ${HOST}/g" \
              -e "s/host: mcp.local/host: ${HOST}/g" \
              k8s/ingress.yaml > /tmp/ingress.yaml
          kubectl -n "${{ env.K8S_NAMESPACE }}" apply -f /tmp/ingress.yaml

      - name: Roll out image
        run: |
          set -euo pipefail
          IMAGE_TAG="sha-$(git rev-parse --short HEAD)"
          kubectl -n "${{ env.K8S_NAMESPACE }}" set image \
            deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status \
            deployment/${{ env.DEPLOYMENT_NAME }} --timeout=300s

      - name: Post-deploy status
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" get deploy,svc,ingress
