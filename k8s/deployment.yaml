apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-java
  template:
    metadata:
      labels:
        app: mcp-java
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-service
          image: ghcr.io/micfabian/jmcp:latest
          ports:
            - containerPort: 8080
            - containerPort: 9090
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "--enable-native-access=ALL-UNNAMED -XX:MaxRAMPercentage=80.0"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: MCP_REBUILD_ON_STARTUP
              value: "false"
            - name: MCP_INGEST_INCLUDE_CLASSPATH
              value: "true"
            - name: MCP_INGEST_SCHEDULE_ENABLED
              value: "true"
            - name: MCP_INGEST_SCHEDULE_FIXED_DELAY_MS
              value: "21600000"
            - name: MCP_INGEST_SCHEDULE_INITIAL_DELAY_MS
              value: "60000"
            - name: MCP_HEALTH_MAX_INDEX_AGE
              value: "24h"
            - name: MCP_INGEST_REMOTE_SOURCES_0_ID
              value: "spring-security-csrf"
            - name: MCP_INGEST_REMOTE_SOURCES_0_URL
              value: "https://docs.spring.io/spring-security/reference/servlet/exploits/csrf.html"
            - name: MCP_INGEST_REMOTE_SOURCES_0_FORMAT
              value: "html"
            - name: MCP_INGEST_REMOTE_SOURCES_0_SOURCE_NAME
              value: "Spring Security Reference"
            - name: MCP_INGEST_REMOTE_SOURCES_0_SOURCE_TAG
              value: "spring-security"
            - name: MCP_INGEST_REMOTE_SOURCES_0_VERSION
              value: "6.4"
            - name: MCP_INGEST_REMOTE_SOURCES_0_ENABLED
              value: "true"
            - name: MCP_INGEST_REMOTE_SOURCES_0_FAIL_ON_ERROR
              value: "false"
            - name: MCP_INGEST_REMOTE_SOURCES_1_ID
              value: "spring-framework-constructor-injection"
            - name: MCP_INGEST_REMOTE_SOURCES_1_URL
              value: "https://docs.spring.io/spring-framework/reference/core/beans/dependencies/factory-collaborators.html"
            - name: MCP_INGEST_REMOTE_SOURCES_1_FORMAT
              value: "html"
            - name: MCP_INGEST_REMOTE_SOURCES_1_SOURCE_NAME
              value: "Spring Framework Reference"
            - name: MCP_INGEST_REMOTE_SOURCES_1_SOURCE_TAG
              value: "spring-framework"
            - name: MCP_INGEST_REMOTE_SOURCES_1_VERSION
              value: "6.2"
            - name: MCP_INGEST_REMOTE_SOURCES_1_ENABLED
              value: "true"
            - name: MCP_INGEST_REMOTE_SOURCES_1_FAIL_ON_ERROR
              value: "false"
            - name: MCP_INGEST_REMOTE_SOURCES_2_ID
              value: "openjdk-jep-444"
            - name: MCP_INGEST_REMOTE_SOURCES_2_URL
              value: "https://openjdk.org/jeps/444"
            - name: MCP_INGEST_REMOTE_SOURCES_2_FORMAT
              value: "html"
            - name: MCP_INGEST_REMOTE_SOURCES_2_SOURCE_NAME
              value: "OpenJDK JEP"
            - name: MCP_INGEST_REMOTE_SOURCES_2_SOURCE_TAG
              value: "openjdk"
            - name: MCP_INGEST_REMOTE_SOURCES_2_VERSION
              value: "25"
            - name: MCP_INGEST_REMOTE_SOURCES_2_ENABLED
              value: "true"
            - name: MCP_INGEST_REMOTE_SOURCES_2_FAIL_ON_ERROR
              value: "false"
            - name: MCP_INGEST_REMOTE_SOURCES_3_ID
              value: "openjdk-jep-505"
            - name: MCP_INGEST_REMOTE_SOURCES_3_URL
              value: "https://openjdk.org/jeps/505"
            - name: MCP_INGEST_REMOTE_SOURCES_3_FORMAT
              value: "html"
            - name: MCP_INGEST_REMOTE_SOURCES_3_SOURCE_NAME
              value: "OpenJDK JEP"
            - name: MCP_INGEST_REMOTE_SOURCES_3_SOURCE_TAG
              value: "openjdk"
            - name: MCP_INGEST_REMOTE_SOURCES_3_VERSION
              value: "25"
            - name: MCP_INGEST_REMOTE_SOURCES_3_ENABLED
              value: "true"
            - name: MCP_INGEST_REMOTE_SOURCES_3_FAIL_ON_ERROR
              value: "false"
            - name: MCP_INGRESS_ENFORCE_HTTPS
              value: "false"
            - name: MCP_INGRESS_HSTS_ENABLED
              value: "false"
            - name: MCP_TRUSTED_PROXIES
              value: '10\\..*|192\\.168\\..*|172\\.(1[6-9]|2\\d|3[0-1])\\..*|127\\.0\\.0\\.1|::1'
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-java-secrets
                  key: api-key
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 10
            periodSeconds: 10
