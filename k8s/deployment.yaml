apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-java
  template:
    metadata:
      labels:
        app: mcp-java
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: mcp-service
          image: myorg/mcp-java:latest
          ports:
            - containerPort: 8080
            - containerPort: 9090
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "--enable-native-access=ALL-UNNAMED -XX:MaxRAMPercentage=80.0"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: MCP_REBUILD_ON_STARTUP
              value: "false"
            - name: MCP_TRUSTED_PROXIES
              value: '10\\..*|192\\.168\\..*|172\\.(1[6-9]|2\\d|3[0-1])\\..*|127\\.0\\.0\\.1|::1'
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-java-secrets
                  key: api-key
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
