spring:
  graphql:
    graphiql:
      enabled: false

server:
  shutdown: graceful
  forward-headers-strategy: native

grpc:
  server:
    reflection-service-enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoint:
    health:
      show-details: never
      group:
        readiness:
          include: readinessState,jmcp

mcp:
  ingest:
    rebuild-on-startup: ${MCP_REBUILD_ON_STARTUP:false}
    include-classpath: ${MCP_INGEST_INCLUDE_CLASSPATH:true}
    schedule:
      enabled: ${MCP_INGEST_SCHEDULE_ENABLED:false}
      fixed-delay-ms: ${MCP_INGEST_SCHEDULE_FIXED_DELAY_MS:21600000}
      initial-delay-ms: ${MCP_INGEST_SCHEDULE_INITIAL_DELAY_MS:30000}
  security:
    api-key: ${MCP_API_KEY:}
    header-name: ${MCP_API_KEY_HEADER:X-API-Key}
  ingress:
    enforce-https: true
    hsts-enabled: true
    hsts-max-age-seconds: ${MCP_HSTS_MAX_AGE_SECONDS:31536000}
    hsts-include-sub-domains: ${MCP_HSTS_INCLUDE_SUBDOMAINS:true}
    hsts-preload: ${MCP_HSTS_PRELOAD:true}
    trusted-proxies: '${MCP_TRUSTED_PROXIES:10\\..*|192\\.168\\..*|172\\.(1[6-9]|2\\d|3[0-1])\\..*|127\\.0\\.0\\.1|::1}'
  health:
    max-index-age: ${MCP_HEALTH_MAX_INDEX_AGE:24h}
